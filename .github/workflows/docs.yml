name: '🚀 Publish the documentation'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Readme documentation version'
        required: true
        type: string
        default: '0.0.5'
      dry:
        description: 'Perform a dry run (preview the changes without publishing)'
        required: true
        type: boolean
        default: true

jobs:
  docs:
    name: Publish Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Publish
        uses: readmeio/rdme@7b543cfd89e3b8f7a99759b04f38df8887a38b7c # v10.9.1
        with:
          rdme: docs upload ./docs --key=${{ secrets.README_API_KEY }} --branch=${{ inputs.version }} ${{ inputs.dry == true && '--dryRun' || '' }}

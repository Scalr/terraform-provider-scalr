name: Release Provider

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  RDME_VERSION: 0.0.5

jobs:
  build:
    name: Build Provider
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Import GPG Key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - id: Auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GOOGLE_WORKLOAD_IDENTITY_POOL_PROVIDER }}
          service_account: ${{ vars.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      - name: Set Up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '.go-version'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
      - name: Upload Provider
        uses: ./.github/actions/upload-provider
        with:
          gcs-bucket: ${{ vars.PROD_BUCKET }}
          registry-domain: ${{ vars.PROD_DOMAIN }}
          gpg-key-id: ${{ steps.import_gpg.outputs.fingerprint }}
          gpg-pub-key: ${{ secrets.GPG_PUBLIC_KEY }}
      - name: Update Network Mirror
        uses: ./.github/actions/update-network-mirror
        with:
          gcs-bucket: ${{ vars.PROD_BUCKET }}
          registry-domain: ${{ vars.PROD_DOMAIN }}
          dry-run: false

  docs-publish:
    name: Publish Docs
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Publish
        uses: readmeio/rdme@7b543cfd89e3b8f7a99759b04f38df8887a38b7c # v10.9.1
        with:
          rdme: docs upload ./docs --key=${{ secrets.README_API_KEY }} --branch=${{ env.RDME_VERSION }}

  e2e-tests:
    name: Trigger E2E Tests
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Sudo GitHub Token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.SUDO_GHA_CLIENT_ID }}
          private-key: ${{secrets.SUDO_GHA_APP_PRIVATE_KEY}}
          owner: ${{ github.repository_owner }}
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{steps.generate_token.outputs.token}}
          script: |
            const tag = '${{ github.ref_name }}';
            const providerVersion = `${tag.replace(/^v/, '')}`;
            await github.rest.actions.createWorkflowDispatch({
              owner: 'Scalr',
              repo: 'fatmouse',
              workflow_id: 'e2e-provider-release.yml',
              ref: 'master',
              inputs: {
                version: providerVersion,
                registry: prod,
                run_post_relese: true
              }
            })

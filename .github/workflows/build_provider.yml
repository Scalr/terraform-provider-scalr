name: Build Development Provider

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - release/**
    paths-ignore:
      - CHANGELOG.md
      - CONTRIBUTING.md
      - README.md
  pull_request:
    branches:
      - master
      - release/**
    paths-ignore:
      - CHANGELOG.md
      - CONTRIBUTING.md
      - README.md

concurrency:
  group: ${{github.head_ref || github.ref}}-${{github.workflow}}

jobs:
  build:
    name: Build Provider
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - id: Auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GOOGLE_WORKLOAD_IDENTITY_POOL_PROVIDER }}
          service_account: ${{ vars.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      - name: Create Development Tag
        run: |
          BRANCH=${{ github.head_ref || github.ref_name }}
          CLEAN_BRANCH=$(echo "$BRANCH" | sed 's/[\/]/-/g')
          git tag v1.0.0-rc-$CLEAN_BRANCH
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '.go-version'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --skip=publish
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
      - name: Upload Provider
        uses: ./.github/actions/upload-provider
        with:
          gcs-bucket: ${{ vars.DEV_BUCKET }}
          registry-domain: ${{ vars.DEV_DOMAIN }}
          gpg-key-id: ${{ steps.import_gpg.outputs.fingerprint }}
          gpg-pub-key: ${{ secrets.GPG_PUBLIC_KEY }}
          is-development: true
      - name: Update Network Mirror
        uses: ./.github/actions/update-network-mirror
        with:
          gcs-bucket: ${{ vars.DEV_BUCKET }}
          registry-domain: ${{ vars.DEV_DOMAIN }}
          dry-run: false
